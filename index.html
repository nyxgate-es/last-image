<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FITS Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/fitsjs/dist/fits.min.js"></script>

<style>

body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

canvas{
    width:207px;
    height:141px;
    image-rendering:auto;
}

</style>
</head>
<body>

<canvas id="canvas" width="207" height="141"></canvas>

<script>

// =====================================================
// ID DE LA CARPETA PÚBLICA DE GOOGLE DRIVE
// =====================================================

const PUBLIC_FOLDER_ID = "1hLHjs0zL92BCQ4YyCOjtxpMaanZFjoNe";


// =====================================================
// CONFIGURACIÓN
// =====================================================

const OUTPUT_WIDTH = 207;
const OUTPUT_HEIGHT = 141;


// =====================================================
// CARGAR FITS
// =====================================================

async function cargarFITS() {

    try {

        // =============================================
        // LEER CONTENIDO DE LA CARPETA PÚBLICA
        // =============================================

        const folderURL =
            `https://drive.google.com/embeddedfolderview?id=${PUBLIC_FOLDER_ID}#list`;

        const folderResponse =
            await fetch(folderURL + '&t=' + Date.now());

        const html =
            await folderResponse.text();


        // =============================================
        // EXTRAER ID DEL ARCHIVO
        // =============================================

        const regex =
            /\/file\/d\/([a-zA-Z0-9_-]+)/;

        const match =
            html.match(regex);

        if (!match) {
            throw new Error(
                "No se encontró archivo FITS"
            );
        }

        const fileId = match[1];


        // =============================================
        // URL DIRECTA DEL FITS
        // =============================================

        const fitsURL =
            `https://drive.google.com/uc?export=download&id=${fileId}`;


        // =============================================
        // DESCARGAR FITS
        // =============================================

        const response =
            await fetch(fitsURL + '&t=' + Date.now());

        const buffer =
            await response.arrayBuffer();


        // =============================================
        // LEER FITS
        // =============================================

        const fits =
            new astro.FITSParser(buffer);

        const hdu =
            fits.getHDU();


        // =============================================
        // DIMENSIONES
        // =============================================

        const width =
            hdu.header.naxis1;

        const height =
            hdu.header.naxis2;


        // =============================================
        // PIXELS
        // =============================================

        const pixels =
            hdu.data.data ||
            hdu.data.view ||
            hdu.data;


        console.log("Width:", width);
        console.log("Height:", height);
        console.log("Pixels:", pixels.length);


        // =============================================
        // RENDERIZAR
        // =============================================

        renderizar(
            pixels,
            width,
            height
        );

    }
    catch(err) {

        console.error(err);

    }
}


// =====================================================
// RENDERIZAR
// =====================================================

function renderizar(
    pixels,
    width,
    height
) {

    // =============================================
    // FILTRAR VALORES
    // =============================================

    const valores = [];

    for (let i = 0; i < pixels.length; i++) {

        const v = pixels[i];

        if (isFinite(v)) {
            valores.push(v);
        }
    }


    // =============================================
    // ORDENAR
    // =============================================

    valores.sort((a, b) => a - b);


    // =============================================
    // PERCENTILES
    // =============================================

    const min =
        valores[
            Math.floor(valores.length * 0.01)
        ];

    const max =
        valores[
            Math.floor(valores.length * 0.995)
        ];


    console.log("Min:", min);
    console.log("Max:", max);


    // =============================================
    // CANVAS TEMPORAL
    // =============================================

    const tempCanvas =
        document.createElement('canvas');

    tempCanvas.width = width;
    tempCanvas.height = height;

    const tempCtx =
        tempCanvas.getContext('2d');

    const imageData =
        tempCtx.createImageData(
            width,
            height
        );


    // =============================================
    // CONVERTIR PIXELS
    // =============================================

    for (let y = 0; y < height; y++) {

        for (let x = 0; x < width; x++) {

            // FITS invertido verticalmente
            const src =
                (height - 1 - y) * width + x;

            let value =
                pixels[src];

            if (!isFinite(value)) {
                value = min;
            }


            // =====================================
            // NORMALIZAR
            // =====================================

            value =
                (value - min) / (max - min);

            value =
                Math.max(
                    0,
                    Math.min(1, value)
                );


            // =====================================
            // ASINH STRETCH
            // =====================================

            value =
                Math.asinh(value * 8) /
                Math.asinh(8);


            // =====================================
            // 8 BITS
            // =====================================

            const c =
                Math.floor(value * 255);


            // =====================================
            // POSICIÓN RGBA
            // =====================================

            const dst =
                (y * width + x) * 4;


            // =====================================
            // MONOCROMO
            // =====================================

            imageData.data[dst] = c;
            imageData.data[dst + 1] = c;
            imageData.data[dst + 2] = c;
            imageData.data[dst + 3] = 255;
        }
    }


    // =============================================
    // PINTAR CANVAS TEMPORAL
    // =============================================

    tempCtx.putImageData(
        imageData,
        0,
        0
    );


    // =============================================
    // CANVAS FINAL
    // =============================================

    const canvas =
        document.getElementById('canvas');

    const ctx =
        canvas.getContext('2d');


    // =============================================
    // LIMPIAR
    // =============================================

    ctx.clearRect(
        0,
        0,
        OUTPUT_WIDTH,
        OUTPUT_HEIGHT
    );


    // =============================================
    // REDIMENSIONAR
    // =============================================

    ctx.drawImage(
        tempCanvas,
        0,
        0,
        OUTPUT_WIDTH,
        OUTPUT_HEIGHT
    );
}


// =====================================================
// INICIAR
// =====================================================

cargarFITS();


// =====================================================
// REFRESCO AUTOMÁTICO
// =====================================================

setInterval(
    cargarFITS,
    5 * 60 * 1000
);

</script>

</body>
</html>
